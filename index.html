    <style>
      html.luma-route-raw,
      html.luma-route-raw body,
      html.luma-route-raw #root {
        min-height: 100%;
        background: #1d1914;
        background: oklch(0.16 0.02 76);
        color: #f4efe7;
        color: oklch(0.97 0.014 86);
        color-scheme: dark;
      }

      html.luma-route-raw body {
        margin: 0;
      }

      #root > [data-lf-raw-boot],
      html:not(.luma-route-raw) #root > [data-lf-raw-boot] {
        display: none;
      }

      /* Boot skeleton mirrors the mobile empty-state hero
         (.raw-mobile-empty in raw-lab.css) on the same cool-slate field, so
         the static pre-bundle paint and the React first paint are isomorphic:
         no substrate, type, or layout jump when the app mounts. The font
         chain matches --font-sans so boot and app share one swap behaviour. */
      html.luma-route-raw #root > [data-lf-raw-boot] {
        box-sizing: border-box;
        display: grid;
        min-height: 100svh;
        min-height: 100dvh;
        place-items: center;
        padding: 2rem 1.75rem;
        background:
          radial-gradient(
            72% 52% at 50% 34%,
            oklch(0.138 0.006 255),
            oklch(0.078 0.006 255) 70%
          ),
          oklch(0.064 0.006 255);
        color: oklch(0.97 0.014 86);
        font-family: 'Geist Sans', ui-sans-serif, system-ui, sans-serif;
        text-align: center;
      }

      [data-lf-raw-boot-panel] {
        display: grid;
        max-width: 30rem;
        gap: 18px;
        justify-items: center;
      }

      [data-lf-raw-boot-mark] {
        display: grid;
        width: 64px;
        height: 64px;
        place-items: center;
        border: 1px solid oklch(0.9 0.006 255 / 0.34);
        border-radius: 14px;
        background: oklch(0.105 0.006 255 / 0.84);
        box-shadow:
          0 16px 36px oklch(0.02 0.006 255 / 0.55),
          inset 0 1px 0 oklch(0.96 0.006 255 / 0.08);
        color: oklch(0.78 0.16 63);
      }

      [data-lf-raw-boot-mark] svg {
        width: 30px;
        height: 30px;
      }

      [data-lf-raw-boot-title] {
        margin: 0;
        max-width: 15rem;
        color: oklch(0.97 0.014 86);
        font-size: 1.4rem;
        font-weight: 760;
        line-height: 1.12;
        letter-spacing: -0.005em;
        text-wrap: balance;
      }

      [data-lf-raw-boot-copy] {
        margin: 0;
        max-width: 280px;
        color: oklch(0.86 0.012 255 / 0.72);
        font-size: 0.86rem;
        line-height: 1.5;
        text-wrap: pretty;
      }

      [data-lf-raw-boot-cta] {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        gap: 8px;
        border: 1px solid oklch(0.54 0.14 153);
        border-radius: 999px;
        background: oklch(0.56 0.15 153);
        color: oklch(0.16 0.018 76);
        font-size: 0.88rem;
        font-weight: 760;
        padding: 0 18px;
      }

      [data-lf-raw-boot-cta] svg {
        width: 16px;
        height: 16px;
      }

      [data-lf-raw-boot-formats] {
        display: inline-flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px;
        color: oklch(0.82 0.01 255 / 0.5);
        font-size: 0.66rem;
        font-weight: 720;
        text-transform: uppercase;
      }

      [data-lf-raw-boot-formats] span {
        border: 1px solid oklch(0.9 0.006 255 / 0.18);
        border-radius: 999px;
        padding: 3px 8px;
      }

      @media (min-width: 48rem) {
        [data-lf-raw-boot-title] {
          max-width: 22rem;
          font-size: 1.9rem;
        }
      }
    </style>
    <script>
      function setRouteSubstrate() {
        const rawPath = window.location.pathname.replace(/\/+$/, '') === '/raw'
        const root = document.documentElement
        root.dataset.lumaRoute = rawPath ? 'raw' : 'app'
        root.classList.toggle('luma-route-raw', rawPath)

        const themeColor = document.querySelector("meta[name='theme-color']")
        if (rawPath && themeColor) {
          themeColor.setAttribute('content', '#0a0c10')
        }
      }
      setRouteSubstrate()
    </script>

    <script>
      function setTheme() {
        let e = 'color-mode',
          t = document.documentElement,
          a = localStorage.getItem(e)
        function h() {
          return window.matchMedia
            ? window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : void 0
            : void 0
        }
        if (!a) {
          t.dataset.theme = h() || 'light'
          return
        }
        switch ((a = JSON.parse(a))) {
          case 'dark':
            t.dataset.theme = 'dark'
            break
          case 'light':
            t.dataset.theme = 'light'
            break
          case 'system':
            t.dataset.theme = h() || 'light'
        }
      }
      setTheme()
    </script>

  <body>
    <div id="root">
      <section data-lf-raw-boot aria-labelledby="lf-raw-boot-title">

            </svg>

    <script>
      /* Localize the boot skeleton before first paint. The head script set the
         route class so the slate boot CSS already applies; this runs inline
         right after the boot DOM is parsed (parser-blocking) so zh-CN readers
         never see an English flash. Mirrors resolveInitialLocale() in
         src/lib/i18n.tsx: stored locale wins, else navigator languages. */
      ;(function localizeRawBoot() {
        if (document.documentElement.dataset.lumaRoute !== 'raw') return
        var locale = 'en'
        try {
          var stored = localStorage.getItem('lumaforge.locale')
          if (stored === 'en' || stored === 'zh-CN') {
            locale = stored
          } else {
            var langs =
              navigator.languages && navigator.languages.length
                ? navigator.languages
                : [navigator.language]
            for (var i = 0; i < langs.length; i++) {
              var n = (langs[i] || '').trim().toLowerCase()
              if (n === 'zh-cn' || n.indexOf('zh') === 0) {
                locale = 'zh-CN'
                break
              }
            }
          }
        } catch (e) {}
        if (locale !== 'zh-CN') return
        document.documentElement.lang = 'zh-CN'
        var title = document.querySelector('[data-lf-raw-boot-title]')
        var copy = document.querySelector('[data-lf-raw-boot-copy]')
        var cta = document.querySelector('[data-lf-raw-boot-cta-label]')
        if (title) title.textContent = '用 LUT 完成一张 RAW'
        if (copy) copy.textContent = '在浏览器本地解码、对比并导出 JPEG。'
        if (cta) cta.textContent = '浏览 RAW 文件'
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
