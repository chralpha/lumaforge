<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#ece6dd" />
    <style>
      html.luma-route-raw,
      html.luma-route-raw body,
      html.luma-route-raw #root {
        min-height: 100%;
        background: #1d1914;
        background: oklch(0.16 0.02 76);
        color: #f4efe7;
        color: oklch(0.97 0.014 86);
        color-scheme: dark;
      }

      html.luma-route-raw body {
        margin: 0;
      }

      #root > [data-lf-raw-boot],
      html:not(.luma-route-raw) #root > [data-lf-raw-boot] {
        display: none;
      }

      html.luma-route-raw #root > [data-lf-raw-boot] {
        box-sizing: border-box;
        display: grid;
        min-height: 100svh;
        place-items: center;
        padding: 2rem;
        background: oklch(0.16 0.02 76);
        color: oklch(0.97 0.014 86);
        text-align: center;
      }

      [data-lf-raw-boot-panel] {
        display: grid;
        max-width: 32rem;
        gap: 0.75rem;
        justify-items: center;
      }

      [data-lf-raw-boot-kicker] {
        margin: 0;
        color: oklch(0.78 0.08 78);
        font:
          600 0.72rem/1.2 system-ui,
          sans-serif;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      [data-lf-raw-boot-title] {
        margin: 0;
        color: oklch(0.97 0.014 86);
        font:
          650 2rem/1.05 system-ui,
          sans-serif;
        letter-spacing: 0;
      }

      [data-lf-raw-boot-copy] {
        margin: 0;
        max-width: 24rem;
        color: oklch(0.84 0.02 86 / 0.76);
        font:
          400 0.95rem/1.6 system-ui,
          sans-serif;
      }

      @media (min-width: 48rem) {
        [data-lf-raw-boot-title] {
          font-size: 2.6rem;
        }
      }
    </style>
    <script>
      function setRouteSubstrate() {
        const rawPath = window.location.pathname.replace(/\/+$/, '') === '/raw'
        const root = document.documentElement
        root.dataset.lumaRoute = rawPath ? 'raw' : 'app'
        root.classList.toggle('luma-route-raw', rawPath)

        const themeColor = document.querySelector("meta[name='theme-color']")
        if (rawPath && themeColor) {
          themeColor.setAttribute('content', '#1d1914')
        }
      }
      setRouteSubstrate()
    </script>
    <meta name="application-name" content="LumaForge" />

    <script>
      function setTheme() {
        let e = 'color-mode',
          t = document.documentElement,
          a = localStorage.getItem(e)
        function h() {
          return window.matchMedia
            ? window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : void 0
            : void 0
        }
        if (!a) {
          t.dataset.theme = h() || 'light'
          return
        }
        switch ((a = JSON.parse(a))) {
          case 'dark':
            t.dataset.theme = 'dark'
            break
          case 'light':
            t.dataset.theme = 'light'
            break
          case 'system':
            t.dataset.theme = h() || 'light'
        }
      }
      setTheme()
    </script>
